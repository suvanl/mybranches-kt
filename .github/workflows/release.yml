name: Release

on:
  push:
    tags: [ "v*" ]

jobs:
  verify-ci:
    name: Verify CI passed
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check CI status
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: .github/scripts/verify-ci.sh "$REPO" "$SHA"

  release:
    name: Release
    needs: verify-ci
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Build release executable
        run: ./gradlew linkReleaseExecutableMacosArm64

      - name: Package binary
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cp build/bin/macosArm64/releaseExecutable/mb.kexe mb
          tar -czf "mb-macos-arm64-${TAG}.tar.gz" mb

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: >
          gh release create "$TAG"
          "mb-macos-arm64-${TAG}.tar.gz"
          --title "$TAG"
          --generate-notes
